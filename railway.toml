# Root Railway Configuration for Monorepo
# This file tells Railway how to handle the multi-service project

[build]
builder = "NIXPACKS"

# Define the services in this monorepo
[[services]]
name = "frontend"
source = "./frontend"
rootDirectory = "frontend"
healthcheckPath = "/"
healthcheckTimeout = 300

[[services]]
name = "backend"
source = "./backend"
rootDirectory = "backend"
healthcheckPath = "/health"
healthcheckTimeout = 300

# Global environment variables
[env]
NODE_ENV = "production"

# Database configuration for the project
[database]
type = "postgres"
name = "intentional-db"

# Redis configuration
[redis]
name = "intentional-redis"

# Project metadata
[project]
name = "intentional"
type = "monorepo"

# Service-specific configurations
[services.frontend]
framework = "vite"
type = "frontend"

[services.backend]
framework = "nestjs"
type = "backend"
