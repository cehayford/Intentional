# Railway Configuration for Backend
[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"
watchPatterns = ["src/**", "package.json", "tsconfig.json"]
rootDirectory = "backend"

# Explicitly tell Railway this is a Node.js backend app
[project]
type = "backend"
framework = "nestjs"
runtime = "node"
nodeVersion = "18"

[deploy]
startCommand = "npm run start:prod"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
healthcheckCommand = "curl -f http://localhost:3001/health || exit 1"

[env]
NODE_ENV = "production"
PORT = "3001"
ROOT_DIRECTORY = "backend"

[[services]]
name = "backend"
source = "."
healthcheckPath = "/health"
healthcheckTimeout = 300

[services.variables]
DATABASE_URL = "${{RAILWAY_DATABASE_URL}}"
JWT_SECRET = "${{RAILWAY_SECRET_JWT}}"
REDIS_URL = "${{RAILWAY_REDIS_URL}}"
NODE_ENV = "production"
PORT = "3001"

[[services.ports]]
port = 3001
handler = "http"

[scaling]
minInstances = 1
maxInstances = 20
targetMemoryPercent = 75
targetCpuPercent = 70

[metrics]
enabled = true
port = 9101
path = "/metrics"

# Database configuration
[database]
type = "postgres"
name = "intentional-db"

# Redis configuration
[redis]
name = "intentional-redis"

