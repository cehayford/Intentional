[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"
watchPatterns = ["src/**", "package.json", "vite.config.*"]
rootDirectory = "frontend"

[deploy]
# Railway will serve static files from /dist directory
startCommand = "npx serve -s dist -l 3000"
restartPolicyType = "ON_FAILURE"
port = 3000

[env]
NODE_ENV = "production"
REACT_APP_API_URL = "https://intentional-bknd.up.railway.app"
