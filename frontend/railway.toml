[build]
builder = "NIXPACKS"
watchPatterns = ["src/**", "package.json", "vite.config.*"]
rootDirectory = "frontend"

[deploy]
# Railway will automatically serve static files from /dist
# No healthcheck needed for static sites

[env]
NODE_ENV = "production"
REACT_APP_API_URL = "https://intentional-bknd.up.railway.app"
