[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile.prod"
watchPatterns = ["src/**", "package.json", "vite.config.*"]
rootDirectory = "frontend"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[env]
NODE_ENV = "production"
REACT_APP_API_URL = "https://intentional-bknd.up.railway.app"
