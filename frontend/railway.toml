[build]
builder = "NIXPACKS"
watchPatterns = ["src/**", "package.json", "vite.config.*"]
rootDirectory = "frontend"

# Railway automatically serves static files from /dist
# No healthcheck, no port configuration needed

[env]
NODE_ENV = "production"
REACT_APP_API_URL = "https://intentional-bknd.up.railway.app"
