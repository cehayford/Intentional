# Railway Configuration for Frontend
[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"
watchPatterns = ["src/**", "package.json", "vite.config.*"]
rootDirectory = "frontend"

# Explicitly tell Railway this is a Node.js frontend app
[project]
type = "frontend"
framework = "vite"
runtime = "node"
nodeVersion = "20"

[deploy]
startCommand = "nginx -g 'daemon off;'"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
healthcheckCommand = "curl -f http://localhost:3000/health || exit 1"

[env]
NODE_ENV = "production"
PORT = "3000"
VITE_API_URL = "${{RAILWAY_PUBLIC_DOMAIN}}"
ROOT_DIRECTORY = "frontend"
NIXPACKS_BUILD_COMMAND = "npm run build"
NIXPACKS_START_COMMAND = "cp -r dist/* /usr/share/nginx/html/ && nginx -g 'daemon off;'"

[[services]]
name = "frontend"
source = "."
healthcheckPath = "/"
healthcheckTimeout = 300

[services.variables]
VITE_API_URL = "${{RAILWAY_PUBLIC_DOMAIN}}"
NODE_ENV = "production"

[[services.ports]]
port = 3000
handler = "http"

[scaling]
minInstances = 1
maxInstances = 10
targetMemoryPercent = 70
targetCpuPercent = 80

[metrics]
enabled = true
port = 9100
path = "/metrics"

