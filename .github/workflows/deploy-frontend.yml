name: Deploy Frontend to Railway

on:
  push:
    branches: [ main ]
    paths: 
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
      - 'railway-environments.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - production
        - staging
      health_check_timeout:
        description: 'Health check timeout (seconds)'
        required: false
        default: '300'
        type: string
      rollback_enabled:
        description: 'Enable rollback on failure'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '18'

jobs:
  test-and-build:
    name: Test and Build Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Run linting
      working-directory: ./frontend
      run: npm run lint --if-present
    
    - name: Run tests
      working-directory: ./frontend
      run: npm test -- --coverage --watchAll=false --passWithNoTests
    
    - name: Build application
      working-directory: ./frontend
      run: npm run build
      env:
        VITE_API_URL: ${{ github.event.inputs.environment == 'staging' && 'https://intentional-api-staging.railway.app' || 'https://intentional-api.railway.app' }}
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist/
        retention-days: 1

  deploy-to-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test-and-build
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist/
    
    - name: Setup Railway CLI
      run: npm install -g @railway/cli
    
    - name: Login to Railway
      run: railway login --token ${{ secrets.RAILWAY_TOKEN }}
    
    - name: Deploy to Railway
      run: |
        railway up --service frontend --environment ${{ github.event.inputs.environment || 'staging' }}
    
    - name: Get deployment URL
      id: deployment
      run: |
        URL=$(railway status --json --environment ${{ github.event.inputs.environment || 'staging' }} | jq -r '.services[] | select(.name == "frontend") | .url')
        echo "url=$URL" >> $GITHUB_OUTPUT
        echo "Deployment URL: $URL"
    
    - name: Health Check
      run: |
        timeout ${{ github.event.inputs.health_check_timeout || 300 }} bash -c '
          until curl -f -s "${{ steps.deployment.outputs.url }}/health" > /dev/null 2>&1; do
            echo "Waiting for frontend to be healthy..."
            sleep 10
          done
          echo "Frontend is healthy!"
        ' || {
          echo "Health check failed"
          if [ "${{ github.event.inputs.rollback_enabled }}" = "true" ]; then
            echo "Initiating rollback..."
            railway rollback --service frontend --environment ${{ github.event.inputs.environment || 'staging' }}
          fi
          exit 1
        }
    
    - name: Run Comprehensive Health Check
      run: |
        chmod +x ./scripts/health-check.sh
        ./scripts/health-check.sh ${{ github.event.inputs.environment || 'staging' }} frontend ${{ github.event.inputs.health_check_timeout || 300 }}
    
    - name: Notify Deployment Success
      if: success()
      run: |
        echo "✅ Frontend deployed successfully to ${{ github.event.inputs.environment || 'staging' }}"
        echo "🌐 ${{ steps.deployment.outputs.url }}"
        echo "📊 Health checks passed"
    
    - name: Notify Deployment Failure
      if: failure()
      run: |
        echo "❌ Frontend deployment failed"
        echo "🔍 Check the deployment logs for details"
        echo "🔄 Rollback initiated if enabled"

  blue-green-deploy:
    name: Blue-Green Deployment (Production)
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event.inputs.environment == 'production'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist/
    
    - name: Setup Railway CLI
      run: npm install -g @railway/cli
    
    - name: Login to Railway
      run: railway login --token ${{ secrets.RAILWAY_TOKEN }}
    
    - name: Create Temporary Environment
      run: |
        TEMP_ENV="frontend-temp-$(date +%s)"
        railway environment create "$TEMP_ENV" --clone production
        echo "TEMP_ENV=$TEMP_ENV" >> $GITHUB_ENV
    
    - name: Deploy to Temporary Environment
      run: |
        railway up --service frontend --environment "$TEMP_ENV"
    
    - name: Health Check Temporary Environment
      run: |
        TEMP_URL=$(railway status --json --environment "$TEMP_ENV" | jq -r '.services[] | select(.name == "frontend") | .url')
        timeout 300 bash -c '
          until curl -f -s "'"$TEMP_URL"'/health" > /dev/null 2>&1; do
            echo "Waiting for temporary frontend to be healthy..."
            sleep 10
          done
          echo "Temporary frontend is healthy!"
        ' || {
          echo "Temporary environment health check failed"
          railway environment delete "$TEMP_ENV" --force
          exit 1
        }
    
    - name: Deploy to Production
      run: |
        railway up --service frontend --environment production
    
    - name: Production Health Check
      run: |
        timeout 300 bash -c '
          until curl -f -s "https://intentional-app.railway.app/health" > /dev/null 2>&1; do
            echo "Waiting for production frontend to be healthy..."
            sleep 10
          done
          echo "Production frontend is healthy!"
        ' || {
          echo "Production health check failed, initiating rollback..."
          railway rollback --service frontend --environment production
          exit 1
        }
    
    - name: Cleanup Temporary Environment
      if: always()
      run: railway environment delete "$TEMP_ENV" --force
    
    - name: Notify Blue-Green Deployment Success
      if: success()
      run: |
        echo "✅ Blue-green deployment completed successfully"
        echo "🌐 https://intentional-app.railway.app"
        echo "🔄 Zero downtime deployment achieved"

  monitor-deployment:
    name: Monitor Deployment
    runs-on: ubuntu-latest
    needs: [deploy-to-railway, blue-green-deploy]
    if: always() && (needs.deploy-to-railway.result == 'success' || needs.blue-green-deploy.result == 'success')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Railway CLI
      run: npm install -g @railway/cli
    
    - name: Login to Railway
      run: railway login --token ${{ secrets.RAILWAY_TOKEN }}
    
    - name: Monitor Service Health
      run: |
        echo "🔍 Monitoring service health for 5 minutes..."
        for i in {1..30}; do
          echo "Health check $i/30"
          if curl -f -s "https://intentional-app.railway.app/health" > /dev/null 2>&1; then
            echo "✅ Service is healthy"
          else
            echo "⚠️ Service health check failed"
          fi
          sleep 10
        done
    
    - name: Generate Deployment Report
      run: |
        echo "## Deployment Report" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Service**: Frontend" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: https://intentional-app.railway.app" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Deployed at**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
