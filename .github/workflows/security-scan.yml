name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM UTC
  workflow_dispatch:

jobs:
  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        category: security-scan
    
    - name: Generate vulnerability report
      if: always()
      run: |
        echo "## Vulnerability Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "Scan completed at: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "Results uploaded to GitHub Security tab" >> $GITHUB_STEP_SUMMARY

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Run npm audit
      run: |
        cd frontend && npm audit --audit-level moderate || true
        cd ../backend && npm audit --audit-level moderate || true
    
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
    
    - name: Upload Snyk results
      if: always()
      run: |
        echo "## Dependency Security Check" >> $GITHUB_STEP_SUMMARY
        echo "npm audit and Snyk scan completed" >> $GITHUB_STEP_SUMMARY

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'typescript' ]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      with:
        config-path: '.gitleaks.toml'
        report-path: 'gitleaks-report.json'
        verbose: true
    
    - name: Upload Gitleaks results
      if: always()
      run: |
        echo "## Secrets Scan Results" >> $GITHUB_STEP_SUMMARY
        if [ -f "gitleaks-report.json" ]; then
          echo "Potential secrets detected. Review the report." >> $GITHUB_STEP_SUMMARY
        else
          echo "No secrets detected" >> $GITHUB_STEP_SUMMARY
        fi

  security-score:
    name: Security Score
    runs-on: ubuntu-latest
    needs: [vulnerability-scan, dependency-check, codeql-analysis, secrets-scan]
    if: always()
    
    outputs:
      security-score: ${{ steps.calculate-score.outputs.SECURITY_SCORE }}
    
    steps:
    - name: Calculate security score
      id: calculate-score
      run: |
        score=100
        
        # Deduct points for failed scans
        if [ "${{ needs.vulnerability-scan.result }}" != "success" ]; then
          score=$((score - 25))
        fi
        
        if [ "${{ needs.dependency-check.result }}" != "success" ]; then
          score=$((score - 20))
        fi
        
        if [ "${{ needs.codeql-analysis.result }}" != "success" ]; then
          score=$((score - 30))
        fi
        
        if [ "${{ needs.secrets-scan.result }}" != "success" ]; then
          score=$((score - 25))
        fi
        
        echo "SECURITY_SCORE=$score" >> $GITHUB_OUTPUT
        
        echo "## Security Score" >> $GITHUB_STEP_SUMMARY
        echo "Current Security Score: $score/100" >> $GITHUB_STEP_SUMMARY
        
        if [ $score -ge 80 ]; then
          echo "🟢 Good security posture" >> $GITHUB_STEP_SUMMARY
        elif [ $score -ge 60 ]; then
          echo "🟡 Moderate security posture" >> $GITHUB_STEP_SUMMARY
        else
          echo "🔴 Poor security posture" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Create security badge
      run: |
        score="${{ steps.calculate-score.outputs.SECURITY_SCORE }}"
        color="red"
        if [ $score -ge 80 ]; then
          color="brightgreen"
        elif [ $score -ge 60 ]; then
          color="yellow"
        fi
        
        echo "Security Score: ![](https://img.shields.io/badge/security-$score%2F100-$color)" >> $GITHUB_STEP_SUMMARY

  notify-security-team:
    name: Notify Security Team
    runs-on: ubuntu-latest
    needs: [security-score]
    if: failure() && github.ref == 'refs/heads/main'
    
    steps:
    - name: Send security alert
      run: |
        echo "🚨 Security scan failed on main branch" 
        echo "Immediate attention required"
        echo "Review the security scan results"
