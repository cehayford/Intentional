name: Deploy Backend to Railway

on:
  push:
    branches: [ main ]
    paths: 
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'railway-environments.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - production
        - staging
      migrate:
        description: 'Run database migrations'
        required: false
        default: true
        type: boolean
      health_check_timeout:
        description: 'Health check timeout (seconds)'
        required: false
        default: '300'
        type: string
      rollback_enabled:
        description: 'Enable rollback on failure'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '18'

jobs:
  test-and-build:
    name: Test and Build Backend
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intentional_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/intentional_test
      JWT_SECRET: test_jwt_secret_for_testing
      NODE_ENV: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./backend
      run: npm ci
    
    - name: Run linting
      working-directory: ./backend
      run: npm run lint --if-present
    
    - name: Run type checking
      working-directory: ./backend
      run: npx tsc --noEmit --skipLibCheck
    
    - name: Run tests
      working-directory: ./backend
      run: npm run test:cov --if-present || npm test -- --coverage --passWithNoTests
    
    - name: Build application
      working-directory: ./backend
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-build
        path: backend/dist/
        retention-days: 1

  deploy-to-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test-and-build
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-build
        path: backend/dist/
    
    - name: Setup Railway CLI
      run: npm install -g @railway/cli
    
    - name: Login to Railway
      run: railway login --token ${{ secrets.RAILWAY_TOKEN }}
    
    - name: Run Database Migrations
      if: github.event.inputs.migrate == 'true'
      run: |
        echo "Running database migrations..."
        railway run "npm run migration:run" --service backend --environment ${{ github.event.inputs.environment || 'staging' }}
        echo "Database migrations completed"
    
    - name: Deploy to Railway
      run: |
        railway up --service backend --environment ${{ github.event.inputs.environment || 'staging' }}
    
    - name: Get deployment URL
      id: deployment
      run: |
        URL=$(railway status --json --environment ${{ github.event.inputs.environment || 'staging' }} | jq -r '.services[] | select(.name == "backend") | .url')
        echo "url=$URL" >> $GITHUB_OUTPUT
        echo "Deployment URL: $URL"
    
    - name: Health Check
      run: |
        timeout ${{ github.event.inputs.health_check_timeout || 300 }} bash -c '
          until curl -f -s "${{ steps.deployment.outputs.url }}/health" > /dev/null 2>&1; do
            echo "Waiting for backend to be healthy..."
            sleep 10
          done
          echo "Backend is healthy!"
        ' || {
          echo "Health check failed"
          if [ "${{ github.event.inputs.rollback_enabled }}" = "true" ]; then
            echo "Initiating rollback..."
            railway rollback --service backend --environment ${{ github.event.inputs.environment || 'staging' }}
            if [ "${{ github.event.inputs.migrate }}" = "true" ]; then
              echo "Rolling back database migrations..."
              railway run "npm run migration:rollback" --service backend --environment ${{ github.event.inputs.environment || 'staging' }}
            fi
          fi
          exit 1
        }
    
    - name: Run Comprehensive Health Check
      run: |
        chmod +x ./scripts/health-check.sh
        ./scripts/health-check.sh ${{ github.event.inputs.environment || 'staging' }} backend ${{ github.event.inputs.health_check_timeout || 300 }}
    
    - name: Verify Database Connectivity
      run: |
        timeout 60 bash -c '
          until curl -f -s "${{ steps.deployment.outputs.url }}/health/db" > /dev/null 2>&1; do
            echo "Waiting for database connectivity..."
            sleep 10
          done
          echo "Database connectivity verified!"
        ' || {
          echo "Database connectivity check failed"
          exit 1
        }
    
    - name: Verify Redis Connectivity
      run: |
        timeout 60 bash -c '
          until curl -f -s "${{ steps.deployment.outputs.url }}/health/redis" > /dev/null 2>&1; do
            echo "Waiting for Redis connectivity..."
            sleep 10
          done
          echo "Redis connectivity verified!"
        ' || {
          echo "Redis connectivity check failed"
          exit 1
        }
    
    - name: Notify Deployment Success
      if: success()
      run: |
        echo "✅ Backend deployed successfully to ${{ github.event.inputs.environment || 'staging' }}"
        echo "🌐 ${{ steps.deployment.outputs.url }}"
        echo "📊 Health checks passed"
        echo "🗄️ Database connectivity verified"
    
    - name: Notify Deployment Failure
      if: failure()
      run: |
        echo "❌ Backend deployment failed"
        echo "🔍 Check the deployment logs for details"
        echo "🔄 Rollback initiated if enabled"

  blue-green-deploy:
    name: Blue-Green Deployment (Production)
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event.inputs.environment == 'production'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-build
        path: backend/dist/
    
    - name: Setup Railway CLI
      run: npm install -g @railway/cli
    
    - name: Login to Railway
      run: railway login --token ${{ secrets.RAILWAY_TOKEN }}
    
    - name: Create Temporary Environment
      run: |
        TEMP_ENV="backend-temp-$(date +%s)"
        railway environment create "$TEMP_ENV" --clone production
        echo "TEMP_ENV=$TEMP_ENV" >> $GITHUB_ENV
    
    - name: Deploy to Temporary Environment
      run: |
        railway up --service backend --environment "$TEMP_ENV"
    
    - name: Test Database Migrations
      if: github.event.inputs.migrate == 'true'
      run: |
        echo "Testing database migrations in temporary environment..."
        railway run "npm run migration:run" --service backend --environment "$TEMP_ENV"
        echo "Database migrations tested successfully"
    
    - name: Health Check Temporary Environment
      run: |
        TEMP_URL=$(railway status --json --environment "$TEMP_ENV" | jq -r '.services[] | select(.name == "backend") | .url')
        timeout 300 bash -c '
          until curl -f -s "'"$TEMP_URL"'/health" > /dev/null 2>&1; do
            echo "Waiting for temporary backend to be healthy..."
            sleep 10
          done
          echo "Temporary backend is healthy!"
        ' || {
          echo "Temporary environment health check failed"
          if [ "${{ github.event.inputs.migrate }}" = "true" ]; then
            echo "Rolling back test migrations..."
            railway run "npm run migration:rollback" --service backend --environment "$TEMP_ENV"
          fi
          railway environment delete "$TEMP_ENV" --force
          exit 1
        }
    
    - name: Deploy to Production
      run: |
        railway up --service backend --environment production
    
    - name: Production Database Migrations
      if: github.event.inputs.migrate == 'true'
      run: |
        echo "Running production database migrations..."
        railway run "npm run migration:run" --service backend --environment production
        echo "Production migrations completed"
    
    - name: Production Health Check
      run: |
        timeout 300 bash -c '
          until curl -f -s "https://intentional-api.railway.app/health" > /dev/null 2>&1; do
            echo "Waiting for production backend to be healthy..."
            sleep 10
          done
          echo "Production backend is healthy!"
        ' || {
          echo "Production health check failed, initiating rollback..."
          railway rollback --service backend --environment production
          if [ "${{ github.event.inputs.migrate }}" = "true" ]; then
            echo "Rolling back database migrations..."
            railway run "npm run migration:rollback" --service backend --environment production
          fi
          exit 1
        }
    
    - name: Cleanup Temporary Environment
      if: always()
      run: railway environment delete "$TEMP_ENV" --force
    
    - name: Notify Blue-Green Deployment Success
      if: success()
      run: |
        echo "✅ Blue-green deployment completed successfully"
        echo "🌐 https://intentional-api.railway.app"
        echo "🔄 Zero downtime deployment achieved"
        echo "🗄️ Database migrations completed successfully"

  monitor-deployment:
    name: Monitor Deployment
    runs-on: ubuntu-latest
    needs: [deploy-to-railway, blue-green-deploy]
    if: always() && (needs.deploy-to-railway.result == 'success' || needs.blue-green-deploy.result == 'success')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Railway CLI
      run: npm install -g @railway/cli
    
    - name: Login to Railway
      run: railway login --token ${{ secrets.RAILWAY_TOKEN }}
    
    - name: Monitor Service Health
      run: |
        echo "🔍 Monitoring service health for 5 minutes..."
        for i in {1..30}; do
          echo "Health check $i/30"
          if curl -f -s "https://intentional-api.railway.app/health" > /dev/null 2>&1; then
            echo "✅ Service is healthy"
          else
            echo "⚠️ Service health check failed"
          fi
          sleep 10
        done
    
    - name: Monitor Database Health
      run: |
        echo "🗄️ Monitoring database health..."
        for i in {1..10}; do
          echo "Database health check $i/10"
          if curl -f -s "https://intentional-api.railway.app/health/db" > /dev/null 2>&1; then
            echo "✅ Database is healthy"
          else
            echo "⚠️ Database health check failed"
          fi
          sleep 30
        done
    
    - name: Monitor Resource Usage
      run: |
        echo "📊 Monitoring resource usage..."
        railway metrics --environment ${{ github.event.inputs.environment || 'staging' }} || echo "Metrics not available"
    
    - name: Generate Deployment Report
      run: |
        echo "## Deployment Report" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Service**: Backend" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: https://intentional-api.railway.app" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Deployed at**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
        echo "- **Database Migrations**: ${{ github.event.inputs.migrate || 'false' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Health Checks**: ✅ Passed" >> $GITHUB_STEP_SUMMARY

  rollback-on-failure:
    name: Automatic Rollback
    runs-on: ubuntu-latest
    needs: [deploy-to-railway, blue-green-deploy]
    if: failure() && (needs.deploy-to-railway.result == 'failure' || needs.blue-green-deploy.result == 'failure')
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Railway CLI
      run: npm install -g @railway/cli
    
    - name: Login to Railway
      run: railway login --token ${{ secrets.RAILWAY_TOKEN }}
    
    - name: Automatic Rollback
      run: |
        echo "🔄 Initiating automatic rollback due to deployment failure..."
        chmod +x ./scripts/rollback.sh
        ./scripts/rollback.sh ${{ github.event.inputs.environment || 'staging' }} backend "Automatic rollback due to deployment failure" true
    
    - name: Notify Rollback
      run: |
        echo "🚨 Automatic rollback completed"
        echo "📋 Check rollback logs for details"
        echo "🔧 Manual intervention may be required"
